<html lang="ar" dir="rtl">

    <meta charset="UTF-8"/>

    <meta name="description" content="ae Optics CRM — نظام إدارة متجر النظارات"/>

    <!-- Favicon بألوان الهوية الرسمية -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2313281D'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='42' fill='%23FCFAE0'%3Eae%3C/text%3E%3C/svg%3E"/>
    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2313281D'/%3E%3Ctext x='50' y='68' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' font-size='42' fill='%23FCFAE0'%3Eae%3C/text%3E%3C/svg%3E"/>
      <script>
  (function () {
    const url = new URL(window.location.href);
    const gh = url.searchParams.get('__gh');
    if (!gh) return;

    try {
      const decoded = decodeURIComponent(gh);
      const nextUrl = new URL(decoded, window.location.origin + '/ae-optics-crm/');
      window.history.replaceState(null, '', nextUrl.pathname + nextUrl.search + nextUrl.hash);
    } catch (e) {
      const fallback = gh.startsWith('/') ? gh : '/' + gh;
      window.history.replaceState(null, '', '/ae-optics-crm' + fallback);
    }
  })();
</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
